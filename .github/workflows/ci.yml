name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: roust-rs

      # The Python test suite drives the real roust-rs binary via
      # subprocess (tests/_roust_bin.py), so it must exist before pytest
      # runs -- otherwise every test skips.
      - name: Build roust-rs release binary
        run: cargo build --release
        working-directory: roust-rs

      - name: Run pytest
        run: uv run pytest tests/

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roust-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: roust-rs

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release
