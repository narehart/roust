name: Release

# Tag push (`vX.Y.Z`) triggers a real release. `workflow_dispatch` with
# `dry_run` (default true) builds every artifact but skips every publish
# step -- use it to test this workflow before the PyPI/crates.io/GitHub
# Release credentials exist. See RELEASE.md.
on:
  push:
    # Strict vX.Y.Z only (per RELEASE.md) -- a loose "v*" would let a typo'd
    # or experimental tag (v-test, v0.2.0rc1) trigger a REAL publish, since a
    # tag push always runs the full publish path.
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only -- skip PyPI, crates.io, and GitHub Release publish steps"
        type: boolean
        default: true

permissions:
  contents: read

env:
  # Non-empty only when this is an intentional dry run (manual dispatch with
  # the box checked). A tag push is always a real release.
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ env.DRY_RUN }}
    steps:
      - name: Report mode
        run: |
          if [ "${{ env.DRY_RUN }}" = "true" ]; then
            echo "::notice::Dry run -- artifacts will be built, publish steps will be skipped."
          else
            echo "::notice::Real release for ${{ github.ref_name }} -- publish steps will run."
          fi

  sdist:
    name: Build sdist
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheel (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            # macos-13 (Intel) was retired; macos-15-intel is the standard
            # Intel runner going forward (supported through Fall 2027 --
            # https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/).
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: "2_17"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: "2_17"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -o dist --compatibility pypi
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}

      # The wheel already embeds the raw platform binary (that's the point
      # of `bindings = "bin"`); pull it back out so the GitHub Release can
      # ship it directly instead of making users unzip a wheel.
      - name: Package raw binary for GitHub Release
        shell: bash
        run: python3 scripts/package_binary.py dist/*.whl ${{ matrix.target }} binaries

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.target }}
          path: dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: dist-binary-${{ matrix.target }}
          path: binaries/*

  publish-pypi:
    name: Publish to PyPI
    needs: [plan, sdist, wheels]
    if: needs.plan.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/roust/
    permissions:
      # Required for PyPI trusted publishing (OIDC) -- no API token stored.
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          pattern: dist-sdist
          merge-multiple: true
          path: dist

      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          pattern: dist-wheel-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-crates-io:
    name: Publish to crates.io
    # Deliberately a separate JOB from publish-pypi and github-release (a
    # missing or invalid CARGO_REGISTRY_TOKEN fails only this job), but it
    # still requires the sdist + wheel builds to have SUCCEEDED first: a
    # cargo publish is irrevocable, so nothing may reach any registry from a
    # commit whose Python-side artifacts don't even build.
    needs: [plan, sdist, wheels]
    if: needs.plan.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo publish
        working-directory: roust-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  github-release:
    name: Create GitHub Release
    needs: [plan, sdist, wheels]
    if: needs.plan.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download raw binaries
        uses: actions/download-artifact@v4
        with:
          pattern: dist-binary-*
          merge-multiple: true
          path: binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: binaries/*
